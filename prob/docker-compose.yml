version: '3.8'

services:
  neo4j:
    image: neo4j:5.15.0
    container_name: klubok-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
      # Важно: отключаем enterprise фичи для community версии
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=no
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - klubok-network
    healthcheck:
      test: ["CMD-SHELL", "echo RETURN 1 | cypher-shell -u neo4j -p password123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: klubok-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - klubok-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klubok-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
      - ES_HOST=http://elasticsearch:9200
      - ES_INDEX=scientific_docs
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - klubok-network
    depends_on:
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

networks:
  klubok-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  es_data: